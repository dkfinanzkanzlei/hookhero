<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hook Hero — Orbit</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:transparent; overflow:hidden; cursor:none; }

  /* CUSTOM CURSOR */
  #cur {
    position: fixed; pointer-events: none; z-index: 9999;
    border-radius: 50%; transform: translate(-50%,-50%);
    width: 34px; height: 34px;
    border: 1.5px solid rgba(0,180,255,0.8);
    background: transparent;
    transition: width .4s cubic-bezier(.34,1.4,.64,1),
                height .4s cubic-bezier(.34,1.4,.64,1),
                background .35s, border-color .35s, box-shadow .35s, opacity .25s;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; opacity: 0;
  }
  #cur.big {
    width: 210px; height: 210px;
    background: rgba(0,8,28,0.93);
    border-color: rgba(0,180,255,1);
    box-shadow: 0 0 40px rgba(0,180,255,0.35), 0 0 80px rgba(0,180,255,0.12);
  }
  #cur-text {
    color: #fff; font-family: 'Rajdhani',sans-serif; font-size: 11.5px;
    font-weight: 600; line-height: 1.55; text-align: center; padding: 18px;
    opacity: 0; transition: opacity .22s .18s; letter-spacing: .02em;
  }
  #cur.big #cur-text { opacity: 1; }

  /* ORBIT RINGS */
  .ring {
    position: absolute; border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    pointer-events: none;
  }

  /* LOGO */
  #logo-wrap {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    pointer-events: none; z-index: 5;
  }
  #logo-wrap img {
    width: 130px; height: 130px; object-fit: contain; display: block;
    filter: drop-shadow(0 0 14px rgba(0,190,255,0.55))
            drop-shadow(0 0 36px rgba(0,190,255,0.25))
            drop-shadow(0 8px 22px rgba(0,160,255,0.75))
            drop-shadow(0 14px 30px rgba(30,120,255,0.45));
  }

  /* SERVICE LABELS */
  #labels { position: absolute; inset: 0; pointer-events: none; }
  .sl {
    position: absolute; transform: translate(-50%,-50%);
    background: rgba(0,10,30,0.82);
    border: 1px solid rgba(0,180,255,0.6);
    color: #fff; font-family: 'Rajdhani',sans-serif;
    font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    padding: 7px 18px 7px 14px; border-radius: 30px; white-space: nowrap;
    display: flex; align-items: center; gap: 7px;
    backdrop-filter: blur(6px);
    box-shadow: 0 0 12px rgba(0,180,255,0.2);
    pointer-events: auto; cursor: none;
    transition: transform .2s, box-shadow .2s;
  }
  .sl:hover { transform: translate(-50%,-50%) scale(1.08); box-shadow: 0 0 28px rgba(0,180,255,0.45); }
  .sl-emoji { font-size: 15px; line-height: 1; }

  /* CORNERS */
  .corner { position: absolute; width: 22px; height: 22px; border-color: rgba(0,150,255,0.35); border-style: solid; pointer-events: none; z-index: 10; }
  .tl { top:14px; left:14px; border-width:1.5px 0 0 1.5px; }
  .tr { top:14px; right:14px; border-width:1.5px 1.5px 0 0; }
  .bl { bottom:14px; left:14px; border-width:0 0 1.5px 1.5px; }
  .br { bottom:14px; right:14px; border-width:0 1.5px 1.5px 0; }

  /* TAGLINE */
  #tagline {
    position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
    font-family: 'Rajdhani',sans-serif; font-size: 16px; font-weight: 700;
    letter-spacing: .22em; color: #e8f4ff; text-transform: uppercase;
    pointer-events: none; white-space: nowrap; z-index: 10;
    animation: fi 2s 2s both;
  }
  @keyframes fi { from{opacity:0} to{opacity:1} }
</style>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="cur"><div id="cur-text"></div></div>
<div id="labels"></div>
<div id="logo-wrap"><img src="public/logo.png" alt="Hook Hero"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div id="tagline">Alle Kanäle · Eine Agentur · Ein Ziel</div>

<script>
const services = [
  { name: 'Hook-Erstellung', emoji: '🎣', orbit: 0, phase: 0,
    tooltip: 'Ein starker Hook entscheidet, ob dein Content gesehen wird — oder für immer ignoriert bleibt.' },
  { name: 'Social Media',    emoji: '📱', orbit: 1, phase: 0.5,
    tooltip: 'Wir bauen deinen Kanal auf und sorgen dafür, dass jeder Post performt.' },
  { name: 'Website',         emoji: '🌐', orbit: 0, phase: 2.09,
    tooltip: 'Investiere einmal in eine Website, die dein Produkt für dich verkauft.' },
  { name: 'Content-Strategie', emoji: '🧠', orbit: 1, phase: 2.62,
    tooltip: 'Kein Zufall, nur System — wir planen Content, der kontinuierlich wächst.' },
  { name: 'Reichweite',      emoji: '🚀', orbit: 0, phase: 4.19,
    tooltip: 'Wir wissen ganz genau, wie du in den nächsten 30 Tagen mehrere Millionen Menschen erreichst.' },
  { name: 'Branding',        emoji: '⚡', orbit: 1, phase: 4.71,
    tooltip: 'Deine Marke muss auf den ersten Blick überzeugen — wir machen sie unverwechselbar.' },
];

const labelsDiv = document.getElementById('labels');
const cur = document.getElementById('cur');
const curText = document.getElementById('cur-text');

/* Build orbit ring divs */
function makeRing(rx, ry) {
  const d = document.createElement('div');
  d.className = 'ring';
  d.style.width  = rx * 2 + 'px';
  d.style.height = ry * 2 + 'px';
  d.style.border = '1px solid rgba(0,80,180,0.45)';
  document.body.appendChild(d);
  return d;
}

let W, H, cx, cy, rings = [];
const ORBITS = [
  { speedFactor: 1,    rxF: 0.40, ryF: 0.30 },
  { speedFactor: 1.45, rxF: 0.27, ryF: 0.20 },
];

function resize() {
  W = innerWidth; H = innerHeight; cx = W/2; cy = H/2;
  rings.forEach(r => r.remove());
  rings = ORBITS.map(o => makeRing(W * o.rxF, H * o.ryF));
  // Reposition logo
  const lw = document.getElementById('logo-wrap');
  lw.style.left = cx + 'px'; lw.style.top = cy + 'px';
}
resize();
window.addEventListener('resize', resize);

/* Build label elements */
const nodes = services.map(s => {
  const el = document.createElement('div');
  el.className = 'sl';
  const esp = document.createElement('span'); esp.className = 'sl-emoji'; esp.textContent = s.emoji;
  const tsp = document.createElement('span'); tsp.textContent = s.name;
  el.appendChild(esp); el.appendChild(tsp);
  labelsDiv.appendChild(el);

  el.addEventListener('mouseenter', () => { cur.classList.add('big'); curText.textContent = s.tooltip; });
  el.addEventListener('mouseleave', () => { cur.classList.remove('big'); curText.textContent = ''; });
  el.addEventListener('click', () => {
    window.parent.postMessage({ type: 'serviceClick', name: s.name }, '*');
  });

  return { ...s, el, angle: s.phase };
});

/* Cursor */
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px'; cur.style.opacity = '1';
});
document.addEventListener('mouseleave', () => { cur.style.opacity='0'; cur.classList.remove('big'); curText.textContent=''; });
document.addEventListener('mouseenter', () => { cur.style.opacity='1'; });

/* Animation */
const BASE_SPEED = 0.0035;
let last = 0;
function animate(ts) {
  requestAnimationFrame(animate);
  const dt = Math.min(ts - last, 50); last = ts;

  /* Sort by depth for z-index */
  const positioned = nodes.map(n => {
    const o = ORBITS[n.orbit];
    n.angle += BASE_SPEED * o.speedFactor * (dt / 16);
    const rx = W * o.rxF, ry = H * o.ryF;
    const x = cx + rx * Math.cos(n.angle);
    const y = cy + ry * Math.sin(n.angle);
    const depth = (Math.sin(n.angle) + 1) / 2; // 0=back, 1=front
    return { n, x, y, depth };
  });
  positioned.sort((a, b) => a.depth - b.depth);

  positioned.forEach(({ n, x, y, depth }) => {
    n.el.style.left    = x + 'px';
    n.el.style.top     = y + 'px';
    n.el.style.opacity = (0.35 + depth * 0.65).toFixed(2);
    n.el.style.zIndex  = depth < 0.5 ? '2' : '8';
    n.el.style.fontSize = (11 + depth * 4) + 'px';
    const b = Math.round(100 + depth * 155);
    n.el.style.borderColor = `rgba(0,${b},255,${(0.4 + depth*0.5).toFixed(2)})`;
  });
}
requestAnimationFrame(animate);
</script>
</body>
</html>
