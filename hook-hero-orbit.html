<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hook Hero — Orbit Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: radial-gradient(ellipse at 50% 40%, #050d1a 0%, #000814 60%, #000000 100%); overflow: hidden; }
  #c { position: absolute; top: 0; left: 0; }
  #labels { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .sl {
    position: absolute;
    transform: translate(-50%, -50%);
    background: rgba(0, 15, 35, 0.75);
    border: 1px solid rgba(0,207,255,0.6);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 16px 6px 13px;
    border-radius: 30px;
    white-space: nowrap;
    opacity: 0;
    backdrop-filter: blur(8px);
    transition: opacity 0.3s;
    box-shadow: 0 0 14px rgba(0,207,255,0.25), inset 0 0 10px rgba(0,207,255,0.05);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sl-emoji {
    font-size: 14px;
    line-height: 1;
  }
  .corner { position: absolute; width: 28px; height: 28px; border-color: rgba(0,207,255,0.4); border-style: solid; pointer-events: none; z-index: 10; }
  .tl { top: 16px; left: 16px; border-width: 1.5px 0 0 1.5px; }
  .tr { top: 16px; right: 16px; border-width: 1.5px 1.5px 0 0; }
  .bl { bottom: 16px; left: 16px; border-width: 0 0 1.5px 1.5px; }
  .br { bottom: 16px; right: 16px; border-width: 0 1.5px 1.5px 0; }
  #tagline {
    position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
    font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: 0.26em;
    color: rgba(0,0,0,0.75); text-transform: uppercase; pointer-events: none; z-index: 10;
    white-space: nowrap;
    animation: fi 2s 2s both;
  }
  #hint {
    position: absolute; bottom: 42px; left: 50%; transform: translateX(-50%);
    font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: 0.16em;
    color: rgba(0,0,0,0.45); text-transform: uppercase; pointer-events: none; z-index: 10;
    white-space: nowrap;
    animation: fi 2s 3s both;
  }
  @keyframes fi { from { opacity:0 } to { opacity:1 } }
</style>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="c"></canvas>
<div id="labels"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div id="tagline">Alle Kanäle · Eine Agentur · Ein Ziel</div>
<div id="hint">🖱️ Maus bewegen zum Rotieren</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const services = [
  { name: 'Hook-Erstellung', emoji: '🎣', col: 0x00FFCC },
  { name: 'Social Media',    emoji: '📱', col: 0x00CFFF },
  { name: 'Website',         emoji: '🌐', col: 0x4DB8FF },
  { name: 'Content-Strategie', emoji: '🧠', col: 0x00FFCC },
  { name: 'Reichweite',      emoji: '🚀', col: 0x00CFFF },
  { name: 'Branding',        emoji: '⚡', col: 0x4DB8FF },
];

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.6;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.022);

const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 2.5, 13);
camera.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0x001a44, 3));
const pl1 = new THREE.PointLight(0x00CFFF, 6, 30); pl1.position.set(0, 6, 6); scene.add(pl1);
const pl2 = new THREE.PointLight(0x00FFCC, 3, 22); pl2.position.set(-6, -3, -6); scene.add(pl2);
const pl3 = new THREE.PointLight(0x0055FF, 2, 18); pl3.position.set(5, 2, -4); scene.add(pl3);

const grp = new THREE.Group();
scene.add(grp);

function orbitLine(r, tiltX, col, opacity) {
  const pts = [];
  for (let i = 0; i <= 128; i++) {
    const a = (i / 128) * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(a) * r, 0, Math.sin(a) * r));
  }
  const l = new THREE.LineLoop(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: col || 0x0066aa, transparent: true, opacity: opacity || 0.55 })
  );
  l.rotation.x = tiltX;
  grp.add(l);
}
orbitLine(4.5, 0.28, 0x003366, 0.85);
orbitLine(3.5, -0.18, 0x004433, 0.75);

/* LOGO GLOW HALO */
const haloMat = new THREE.MeshBasicMaterial({ color: 0x00DDFF, transparent: true, opacity: 0.18, side: THREE.DoubleSide });
const halo = new THREE.Mesh(new THREE.CircleGeometry(2.4, 64), haloMat);
halo.userData.isLogo = true;
scene.add(halo);
const halo2Mat = new THREE.MeshBasicMaterial({ color: 0x00FFCC, transparent: true, opacity: 0.08, side: THREE.DoubleSide });
const halo2 = new THREE.Mesh(new THREE.CircleGeometry(3.0, 64), halo2Mat);
halo2.userData.isLogo = true;
scene.add(halo2);

/* LOGO IN DER MITTE */
const loader = new THREE.TextureLoader();
loader.load('public/logo.png', function(tex) {
  tex.minFilter = THREE.LinearFilter;
  const logoPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(3.8, 3.8),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false, side: THREE.DoubleSide })
  );
  logoPlane.userData.isLogo = true;
  scene.add(logoPlane);
});

/* GLOW RINGS AROUND CENTER */
const glowRingMat = new THREE.MeshBasicMaterial({ color: 0x00FFCC, transparent: true, opacity: 0.3 });
grp.add(new THREE.Mesh(new THREE.TorusGeometry(1.9, 0.035, 16, 100), glowRingMat));
const ring2Mat = new THREE.MeshBasicMaterial({ color: 0x00CFFF, transparent: true, opacity: 0.55 });
grp.add(new THREE.Mesh(new THREE.TorusGeometry(1.98, 0.012, 16, 100), ring2Mat));
const ring3Mat = new THREE.MeshBasicMaterial({ color: 0x0088FF, transparent: true, opacity: 0.2 });
grp.add(new THREE.Mesh(new THREE.TorusGeometry(2.1, 0.006, 16, 100), ring3Mat));

const nodes = [];
const labelEls = [];
const labelsDiv = document.getElementById('labels');

services.forEach((s, i) => {
  const radius = i % 2 === 0 ? 4.5 : 3.5;
  const tilt   = i % 2 === 0 ? 0.28 : -0.18;
  const baseAngle = (i / services.length) * Math.PI * 2;
  const pillMat = new THREE.MeshStandardMaterial({
    color: 0x001830, emissive: s.col, emissiveIntensity: 0.35,
    metalness: 0.8, roughness: 0.2, transparent: true, opacity: 0.9,
  });
  const pill = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.44, 0.15), pillMat);
  pill.add(new THREE.Mesh(new THREE.BoxGeometry(1.72, 0.46, 0.17),
    new THREE.MeshBasicMaterial({ color: s.col, transparent: true, opacity: 0.35, wireframe: true })));
  const dot = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshBasicMaterial({ color: s.col }));
  dot.position.set(-0.65, 0, 0.1);
  pill.add(dot);
  grp.add(pill);
  nodes.push({ mesh: pill, mat: pillMat, angle: baseAngle, radius, tilt, speed: 0.0016 + i * 0.00012 });

  const el = document.createElement('div');
  el.className = 'sl';
  const emojiSpan = document.createElement('span');
  emojiSpan.className = 'sl-emoji';
  emojiSpan.textContent = s.emoji;
  const textSpan = document.createElement('span');
  textSpan.textContent = s.name;
  el.appendChild(emojiSpan);
  el.appendChild(textSpan);
  labelsDiv.appendChild(el);
  labelEls.push(el);
});

/* STAR FIELD */
const pPos = new Float32Array(600 * 3);
for (let i = 0; i < 600; i++) {
  pPos[i*3]   = (Math.random() - 0.5) * 80;
  pPos[i*3+1] = (Math.random() - 0.5) * 60;
  pPos[i*3+2] = (Math.random() - 0.5) * 80;
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0x4488bb, size: 0.08, transparent: true, opacity: 0.7 })));

let mx = 0, my = 0, tRX = 0, tRY = 0;
document.addEventListener('mousemove', e => {
  mx = (e.clientX / innerWidth  - 0.5) * 2;
  my = (e.clientY / innerHeight - 0.5) * 2;
});
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const _v = new THREE.Vector3();
function toScreen(mesh) {
  mesh.getWorldPosition(_v);
  _v.project(camera);
  return { x: (_v.x * 0.5 + 0.5) * innerWidth, y: (-_v.y * 0.5 + 0.5) * innerHeight, behind: _v.z > 1 };
}

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;
  tRY += (mx * 0.45 - tRY) * 0.04;
  tRX += (-my * 0.2  - tRX) * 0.04;
  grp.rotation.y = tRY;
  grp.rotation.x = tRX;
  scene.children.forEach(obj => { if (obj.userData && obj.userData.isLogo) obj.quaternion.copy(camera.quaternion); });
  glowRingMat.opacity = 0.28 + Math.sin(t * 1.4) * 0.12;
  ring2Mat.opacity    = 0.5  + Math.sin(t * 1.8) * 0.18;
  ring3Mat.opacity    = 0.18 + Math.sin(t * 2.1) * 0.1;
  haloMat.opacity     = 0.14 + Math.sin(t * 0.9) * 0.07;
  halo2Mat.opacity    = 0.06 + Math.sin(t * 0.7) * 0.04;
  nodes.forEach((n, i) => {
    n.angle += n.speed;
    const x = Math.cos(n.angle) * n.radius;
    const z = Math.sin(n.angle) * n.radius;
    const y = Math.sin(n.angle + n.tilt) * 0.75;
    n.mesh.position.set(x, y, z);
    n.mesh.lookAt(camera.position);
    const depth = (z + n.radius) / (n.radius * 2);
    n.mat.opacity = 0.6 + depth * 0.4;
    n.mat.emissiveIntensity = 0.18 + depth * 0.4;
    const s = toScreen(n.mesh);
    const el = labelEls[i];
    if (!s.behind) {
      el.style.left = s.x + 'px'; el.style.top = s.y + 'px';
      el.style.opacity = (0.55 + depth * 0.45).toFixed(2);
      el.style.fontSize = (12 + depth * 3) + 'px';
      const cyan = Math.round(150 + depth * 105);
      el.style.boxShadow = `0 0 ${8 + depth * 12}px rgba(0,${cyan},255,${(0.2 + depth * 0.3).toFixed(2)})`;
      el.style.borderColor = `rgba(0,${cyan},255,${(0.4 + depth * 0.5).toFixed(2)})`;
    } else { el.style.opacity = 0; }
  });
  renderer.render(scene, camera);
}
animate();
setTimeout(() => labelEls.forEach(e => e.style.transition = 'opacity 0.4s'), 600);
</script>
</body>
</html>
