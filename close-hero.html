<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Close Hero – Wartungsarbeiten</title>
  <link rel="icon" type="image/png" sizes="32x32" href="public/favicon-32.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 1rem 5%; display: flex; align-items: center; justify-content: center; gap: 2rem; font-size: .8rem; }
    footer a { color: rgba(255,245,238,.45); text-decoration: none; transition: color .2s; }
    footer a:hover { color: #FFB800; }
    body {
      background: #0a0500;
      color: #fff5ee;
      font-family: 'Barlow', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
      background-image: radial-gradient(ellipse at 50% 30%, rgba(255,69,0,.12) 0%, transparent 65%),
                        radial-gradient(ellipse at 50% 80%, rgba(255,184,0,.07) 0%, transparent 60%);
    }
    .icon { font-size: 3rem; margin-bottom: 1.5rem; }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      line-height: 1;
      background: linear-gradient(135deg, #FF4500, #FFB800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
      letter-spacing: .02em;
    }
    p {
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.75;
      color: rgba(255,245,238,.7);
      max-width: 520px;
    }
    a { color: #FFB800; text-decoration: none; border-bottom: 1px solid rgba(255,184,0,.4); transition: border-color .2s, color .2s; }
    a:hover { color: #FF4500; border-color: #FF4500; }
    .divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, #FF4500, #FFB800, transparent);
      margin: 2rem auto;
    }
  </style>
</head>
<body>
  <div class="icon">🔧</div>
  <h1>Wartungsarbeiten</h1>
  <div class="divider"></div>
  <p>
    Wir sind bis <strong>07. April 2026</strong> in den Wartungsarbeiten.<br/><br/>
    Bei Fragen melden Sie sich gerne bei uns unter<br/>
    <a href="mailto:info@hookhero.de">info@hookhero.de</a><br/><br/>
    Danke für Ihr Verständnis. Bis bald!
  </p>
<footer>
  <a href="datenschutz.html">Datenschutz</a>
  <a href="impressum.html">Impressum</a>
  <a href="index.html">Hook Hero</a>

</html>
