<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Close Hero – Wartungsarbeiten</title>
  <link rel="icon" type="image/png" sizes="32x32" href="public/favicon-32.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #08060a;
      color: #faf6ee;
      font-family: 'Barlow', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 3rem; margin-bottom: 1.5rem; }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      line-height: 1;
      color: #c9a84c;
      margin-bottom: 1.5rem;
      letter-spacing: .02em;
    }
    p {
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.75;
      color: #b8a96a;
      max-width: 520px;
    }
    a { color: #f5d07a; text-decoration: none; border-bottom: 1px solid rgba(245,208,122,.4); transition: border-color .2s; }
    a:hover { border-color: #f5d07a; }
    .divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      margin: 2rem auto;
    }
  </style>
</head>
<body>
  <div class="icon">🔧</div>
  <h1>Wartungsarbeiten</h1>
  <div class="divider"></div>
  <p>
    Wir sind bis <strong>07. April 2026</strong> in den Wartungsarbeiten.<br/><br/>
    Bei Fragen melden Sie sich gerne bei uns unter<br/>
    <a href="mailto:info@hookhero.de">info@hookhero.de</a><br/><br/>
    Danke für Ihr Verständnis. Bis bald!
  </p>
</body>
</html>
